name: Publicar Devociones

on:
  workflow_dispatch:

jobs:
  publicar:
    name: Publicar en Facebook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar secrets requeridos
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          if [ -z "$FACEBOOK_PAGE_ACCESS_TOKEN" ]; then
            echo "❌ Falta el secret FACEBOOK_PAGE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$FACEBOOK_PAGE_ID" ]; then
            echo "❌ Falta el secret FACEBOOK_PAGE_ID"
            exit 1
          fi

          echo "✅ Secrets verificados correctamente"

      - name: Publicar devociones en Facebook
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          python main.py publicar

      - name: Finalizado
        run: echo "✅ Publicación completada"
